<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPL Prediction Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>EPL Prediction Game</h1>

  <!-- Login Section -->
  <div id="login-section">
    <button id="login-btn">Login</button>
    <span id="user-name"></span>
  </div>

  <!-- Matches Table -->
  <div id="matches-section" style="display:none;">
    <h2>Upcoming Matches</h2>
    <table id="matches-table">
      <thead>
        <tr>
          <th>Home Team</th>
          <th>Away Team</th>
          <th>Date / Time</th>
          <th>Your Prediction</th>
          <th>Actual Score</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows dynamically added by app.js -->
      </tbody>
    </table>
  </div>

  <!-- Leaderboard Table -->
  <div id="leaderboard-section" style="display:none;">
    <h2>Leaderboard</h2>
    <table id="leaderboard-table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>User</th>
          <th>Points</th>
        </tr>
      </thead>
      <tbody>
        <!-- Rows dynamically added by app.js -->
      </tbody>
    </table>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EPL Prediction Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0 20px;
      background: #f4f4f4;
      position: relative;
      min-height: 100vh;
    }

    /* Background image with 50% opacity */
    body::after {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('assets/images/background.webp') no-repeat center center;
      background-size: cover;
      opacity: 0.5;
      z-index: -1;
    }

    h1, h2 {
      text-align: center;
      color: #111;
    }

    #login-section {
      text-align: center;
      margin: 20px 0;
    }

    #user-name {
      margin-left: 10px;
      font-weight: bold;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin-bottom: 20px;
      background: #fff;
    }

    table, th, td {
      border: 1px solid #ccc;
    }

    th, td {
      padding: 8px 12px;
      text-align: center;
    }

    th {
      background-color: #0074D9;
      color: #fff;
    }

    input[type=number] {
      width: 50px;
      text-align: center;
    }

    .locked {
      background-color: #e0ffe0;
    }

    #submit-all-btn {
      display: block;
      margin: 0 auto 30px;
      padding: 10px 20px;
      background-color: #2ECC40;
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    #submit-all-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }

    #tables-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: space-between;
    }

    #matches-section, #leaderboard-section {
      flex: 1 1 48%;
    }

    @media(max-width: 768px) {
      #tables-container {
        flex-direction: column;
      }
      #matches-section, #leaderboard-section {
        flex: 1 1 100%;
      }
    }
  </style>
</head>
<body>
  <h1>EPL Prediction Game</h1>

  <!-- Login Section -->
  <div id="login-section">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="login-btn">Login</button>
    <span id="user-name"></span>
  </div>

  <!-- Tables Container -->
  <div id="tables-container" style="display:none;">
    <!-- Matches Table -->
    <div id="matches-section">
      <h2>Upcoming Matches</h2>
      <table id="matches-table">
        <thead>
          <tr>
            <th>Home Team</th>
            <th>Away Team</th>
            <th>Date / Time</th>
            <th>Your Prediction</th>
            <th>Actual Score</th>
          </tr>
        </thead>
        <tbody>
          <!-- Filled dynamically by app.js -->
        </tbody>
      </table>
      <button id="submit-all-btn">Submit All Predictions</button>
    </div>

    <!-- Leaderboard Table -->
    <div id="leaderboard-section">
      <h2>Leaderboard</h2>
      <table id="leaderboard-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>User</th>
            <th>Points</th>
          </tr>
        </thead>
        <tbody>
          <!-- Filled dynamically by app.js -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EPL Prediction Game</title>
<style>
  /* General page styles */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to right, #e0f7fa, #f1f8e9);
    margin: 0;
    padding: 20px;
    color: #333;
  }

  h1 {
    text-align: center;
    color: #01579b;
    margin-bottom: 10px;
    font-size: 2.2rem;
  }

  h2 {
    color: #0277bd;
    margin-top: 40px;
    margin-bottom: 10px;
  }

  /* Login section */
  #login-section {
    text-align: center;
    margin-bottom: 30px;
  }

  #login-btn {
    background-color: #0288d1;
    color: white;
    border: none;
    padding: 10px 25px;
    font-size: 1rem;
    border-radius: 5px;
    transition: background-color 0.3s ease;
    cursor: pointer;
  }

  #login-btn:hover {
    background-color: #0277bd;
  }

  #user-name {
    margin-left: 15px;
    font-weight: bold;
    font-size: 1.1rem;
  }

  /* Table styles */
  table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    border-radius: 8px;
    overflow: hidden;
    background-color: white;
  }

  th, td {
    padding: 12px 15px;
    text-align: center;
  }

  th {
    background-color: #0288d1;
    color: white;
    font-size: 1rem;
  }

  tr:nth-child(even) {
    background-color: #f1f1f1;
  }

  input[type=number] {
    width: 50px;
    padding: 5px;
    border: 1px solid #ccc;
    border-radius: 4px;
    text-align: center;
  }

  button {
    padding: 5px 12px;
    background-color: #26a69a;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: 0.2s ease;
  }

  button:hover {
    background-color: #2bbbad;
  }

  /* Footer spacing */
  body::after {
    content: "";
    display: block;
    height: 40px;
  }

  /* Responsive table */
  @media(max-width: 768px) {
    th, td {
      font-size: 0.9rem;
      padding: 8px 10px;
    }

    #login-btn {
      padding: 8px 20px;
      font-size: 0.9rem;
    }
  }
</style>
</head>
<body>
<h1>EPL Prediction Game</h1>

<div id="login-section">
  <button id="login-btn">Login / Sign Up</button>
  <span id="user-name"></span>
</div>

<h2>Upcoming Matches</h2>
<table id="matches-table">
  <thead>
    <tr>
      <th>Home</th>
      <th>Away</th>
      <th>Kickoff</th>
      <th>Prediction</th>
      <th>Live Score</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h2>Leaderboard</h2>
<table id="leaderboard-table">
  <thead>
    <tr>
      <th>Rank</th>
      <th>Player</th>
      <th>Points</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>
</body>
</html>
